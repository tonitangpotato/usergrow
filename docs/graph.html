<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UserGrow — Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(10, 14, 23, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { font-size: 1.4rem; font-weight: 800; }
    .logo span { color: #00e5a0; }
    .top-bar .controls { display: flex; gap: 10px; align-items: center; }
    .top-bar select, .top-bar button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .top-bar select:hover, .top-bar button:hover {
      background: rgba(255,255,255,0.14);
    }
    .top-bar .back-btn {
      background: rgba(0, 229, 160, 0.15);
      border-color: rgba(0, 229, 160, 0.3);
      color: #00e5a0;
      text-decoration: none;
    }
    #graph-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    svg { width: 100%; height: 100%; }

    /* Tooltip */
    .tooltip {
      position: absolute;
      background: rgba(20, 26, 40, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.85rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 300px;
      z-index: 200;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip h3 { font-size: 1rem; margin-bottom: 6px; color: #00e5a0; }
    .tooltip .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .tooltip .meta { color: rgba(255,255,255,0.6); font-size: 0.8rem; line-height: 1.5; }

    /* Legend */
    .legend {
      position: fixed;
      bottom: 20px; left: 20px;
      background: rgba(20, 26, 40, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
      z-index: 100;
    }
    .legend h4 { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.85rem; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

    /* Stats panel */
    .stats-panel {
      position: fixed;
      bottom: 20px; right: 20px;
      background: rgba(20, 26, 40, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 20px;
      z-index: 100;
      min-width: 180px;
    }
    .stats-panel h4 { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.85rem; }
    .stat-val { color: #00e5a0; font-weight: 600; }

    /* Loading */
    .loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 300;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00e5a0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo"><span>User</span>Grow — Knowledge Graph</div>
    <div class="controls">
      <select id="filterType">
        <option value="all">All Entity Types</option>
        <option value="brand">Brands</option>
        <option value="keyword">Keywords</option>
        <option value="persona">Personas</option>
        <option value="model">AI Models</option>
      </select>
      <select id="filterRelation">
        <option value="all">All Relations</option>
        <option value="visible_to">Visible To</option>
        <option value="visible_in">Visible In (Model)</option>
        <option value="competes_with">Competes With</option>
        <option value="associated_with">Associated With</option>
      </select>
      <button onclick="resetZoom()">Reset View</button>
      <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>
  </div>

  <div id="graph-container">
    <svg id="graph-svg"></svg>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="legend">
    <h4>Entity Types</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div> Brand</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div> Keyword</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div> Persona</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffe66d"></div> AI Model</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a29bfe"></div> Industry</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fd79a8"></div> City</div>
  </div>

  <div class="stats-panel" id="statsPanel">
    <h4>Graph Stats</h4>
    <div class="stat-row"><span>Entities</span><span class="stat-val" id="statEntities">—</span></div>
    <div class="stat-row"><span>Relations</span><span class="stat-val" id="statRelations">—</span></div>
    <div class="stat-row"><span>Brands</span><span class="stat-val" id="statBrands">—</span></div>
    <div class="stat-row"><span>Keywords</span><span class="stat-val" id="statKeywords">—</span></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Loading Knowledge Graph...</div>
  </div>

<script>
const COLORS = {
  brand:    '#00e5a0',
  keyword:  '#ff6b6b',
  persona:  '#4ecdc4',
  model:    '#ffe66d',
  industry: '#a29bfe',
  city:     '#fd79a8',
};

const SIZES = {
  brand:    18,
  keyword:  8,
  persona:  12,
  model:    14,
  industry: 22,
  city:     16,
};

const RELATION_COLORS = {
  visible_to:      'rgba(78, 205, 196, 0.4)',
  visible_in:      'rgba(255, 230, 109, 0.4)',
  competes_with:   'rgba(255, 107, 107, 0.5)',
  associated_with: 'rgba(255, 107, 107, 0.2)',
  belongs_to:      'rgba(162, 155, 254, 0.3)',
  located_in:      'rgba(253, 121, 168, 0.3)',
};

let simulation, svg, g, link, node, label;
let allData = { entities: [], relations: [] };

async function loadGraph() {
  try {
    const resp = await fetch('/api/kg/graph');
    const data = await resp.json();
    allData = data;
    document.getElementById('loading').style.display = 'none';
    renderGraph(data);
    updateStats(data);
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="color:#ff6b6b">Failed to load graph data</div>
      <div style="color:rgba(255,255,255,0.5);margin-top:8px;font-size:0.85rem">${err.message}</div>
    `;
  }
}

function updateStats(data) {
  document.getElementById('statEntities').textContent = data.entities.length;
  document.getElementById('statRelations').textContent = data.relations.length;
  document.getElementById('statBrands').textContent = data.entities.filter(e => e.entity_type === 'brand').length;
  document.getElementById('statKeywords').textContent = data.entities.filter(e => e.entity_type === 'keyword').length;
}

function renderGraph(data) {
  const width = window.innerWidth;
  const height = window.innerHeight;

  // Clear previous
  d3.select('#graph-svg').selectAll('*').remove();

  svg = d3.select('#graph-svg')
    .attr('viewBox', [0, 0, width, height]);

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.2, 5])
    .on('zoom', (event) => g.attr('transform', event.transform));
  svg.call(zoom);
  window._zoom = zoom;

  g = svg.append('g');

  // Build node map
  const nodeMap = {};
  const nodes = data.entities.map(e => {
    const n = { ...e, x: width/2 + (Math.random()-0.5)*400, y: height/2 + (Math.random()-0.5)*400 };
    nodeMap[e.id] = n;
    return n;
  });

  // Build links (only if both source and target exist)
  const links = data.relations
    .filter(r => nodeMap[r.source_id] && nodeMap[r.target_id])
    .map(r => ({
      source: r.source_id,
      target: r.target_id,
      relation_type: r.relation_type,
      weight: r.weight,
    }));

  // Force simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      if (d.relation_type === 'competes_with') return 80;
      if (d.relation_type === 'belongs_to') return 120;
      return 100;
    }).strength(d => Math.min(d.weight || 0.3, 0.8)))
    .force('charge', d3.forceManyBody().strength(d => {
      if (d.entity_type === 'brand') return -300;
      if (d.entity_type === 'industry') return -400;
      return -100;
    }))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => (SIZES[d.entity_type] || 10) + 5));

  // Glow filter
  const defs = svg.append('defs');
  const filter = defs.append('filter').attr('id', 'glow');
  filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  filter.append('feMerge')
    .selectAll('feMergeNode')
    .data(['blur', 'SourceGraphic'])
    .join('feMergeNode')
    .attr('in', d => d);

  // Links
  link = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', d => RELATION_COLORS[d.relation_type] || 'rgba(255,255,255,0.1)')
    .attr('stroke-width', d => Math.max(1, (d.weight || 0.3) * 3))
    .attr('stroke-dasharray', d => d.relation_type === 'competes_with' ? '5,3' : null);

  // Nodes
  node = g.append('g')
    .selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r', d => SIZES[d.entity_type] || 10)
    .attr('fill', d => COLORS[d.entity_type] || '#888')
    .attr('stroke', d => d3.color(COLORS[d.entity_type] || '#888').brighter(0.5))
    .attr('stroke-width', 1.5)
    .attr('filter', d => d.entity_type === 'brand' ? 'url(#glow)' : null)
    .attr('cursor', 'pointer')
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', highlightConnected)
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd));

  // Labels (only for brands, models, industry, city)
  label = g.append('g')
    .selectAll('text')
    .data(nodes.filter(n => ['brand', 'model', 'industry', 'city'].includes(n.entity_type)))
    .join('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => (SIZES[d.entity_type] || 10) + 14)
    .attr('font-size', d => d.entity_type === 'industry' ? '11px' : '9px')
    .attr('fill', d => d3.color(COLORS[d.entity_type] || '#888').brighter(0.3))
    .attr('font-weight', d => d.entity_type === 'brand' ? '600' : '400')
    .text(d => d.name.length > 20 ? d.name.substring(0, 18) + '…' : d.name);

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node
      .attr('cx', d => d.x)
      .attr('cy', d => d.y);
    label
      .attr('x', d => d.x)
      .attr('y', d => d.y);
  });
}

// Drag handlers
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Tooltip
function showTooltip(event, d) {
  const tip = document.getElementById('tooltip');
  const color = COLORS[d.entity_type] || '#888';
  let metaHtml = '';
  if (d.metadata) {
    const m = typeof d.metadata === 'string' ? JSON.parse(d.metadata) : d.metadata;
    metaHtml = Object.entries(m).map(([k,v]) => `<div>${k}: ${v}</div>`).join('');
  }
  // Count connections
  const connections = allData.relations.filter(r => r.source_id === d.id || r.target_id === d.id).length;
  tip.innerHTML = `
    <span class="type-badge" style="background:${color}33;color:${color}">${d.entity_type}</span>
    <h3>${d.name}</h3>
    <div class="meta">
      <div>${connections} connection${connections !== 1 ? 's' : ''}</div>
      ${metaHtml}
    </div>
  `;
  tip.classList.add('visible');
  tip.style.left = event.pageX + 15 + 'px';
  tip.style.top = event.pageY - 10 + 'px';
}
function moveTooltip(event) {
  const tip = document.getElementById('tooltip');
  tip.style.left = event.pageX + 15 + 'px';
  tip.style.top = event.pageY - 10 + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// Click to highlight connected nodes
function highlightConnected(event, d) {
  const connected = new Set([d.id]);
  allData.relations.forEach(r => {
    if (r.source_id === d.id) connected.add(r.target_id);
    if (r.target_id === d.id) connected.add(r.source_id);
  });

  node.attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  label.attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  link.attr('opacity', l => {
    const src = typeof l.source === 'object' ? l.source.id : l.source;
    const tgt = typeof l.target === 'object' ? l.target.id : l.target;
    return (src === d.id || tgt === d.id) ? 1 : 0.05;
  });

  // Double-click to reset
  event.stopPropagation();
}

// Click background to reset highlight
document.getElementById('graph-svg').addEventListener('click', (e) => {
  if (e.target.tagName === 'svg' || e.target.tagName === 'SVG') {
    if (node) node.attr('opacity', 1);
    if (label) label.attr('opacity', 1);
    if (link) link.attr('opacity', 1);
  }
});

function resetZoom() {
  svg.transition().duration(750).call(window._zoom.transform, d3.zoomIdentity);
}

// Filters
document.getElementById('filterType').addEventListener('change', applyFilters);
document.getElementById('filterRelation').addEventListener('change', applyFilters);

function applyFilters() {
  const typeFilter = document.getElementById('filterType').value;
  const relFilter = document.getElementById('filterRelation').value;

  let filtered = { ...allData };

  if (typeFilter !== 'all') {
    // Show selected type + their directly connected entities
    const typeIds = new Set(allData.entities.filter(e => e.entity_type === typeFilter).map(e => e.id));
    const connectedIds = new Set(typeIds);
    allData.relations.forEach(r => {
      if (typeIds.has(r.source_id)) connectedIds.add(r.target_id);
      if (typeIds.has(r.target_id)) connectedIds.add(r.source_id);
    });
    filtered.entities = allData.entities.filter(e => connectedIds.has(e.id));
    filtered.relations = allData.relations.filter(r => connectedIds.has(r.source_id) && connectedIds.has(r.target_id));
  }

  if (relFilter !== 'all') {
    const relIds = new Set();
    filtered.relations = filtered.relations.filter(r => {
      if (r.relation_type === relFilter) {
        relIds.add(r.source_id);
        relIds.add(r.target_id);
        return true;
      }
      return false;
    });
    filtered.entities = filtered.entities.filter(e => relIds.has(e.id));
  }

  renderGraph(filtered);
  updateStats(filtered);
}

// Init
loadGraph();

// Auto-refresh every 30s
setInterval(async () => {
  try {
    const resp = await fetch('/api/kg/graph');
    const data = await resp.json();
    if (data.entities.length !== allData.entities.length || data.relations.length !== allData.relations.length) {
      allData = data;
      applyFilters();
    }
  } catch {}
}, 30000);
</script>
</body>
</html>
