name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: usergrow

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: usergrow

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format
        run: cargo fmt -- --check

      - name: Test
        run: cargo test

  docs-lint:
    name: Docs Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PITCH.md word limit (200 words)
        run: |
          if [ -f docs/PITCH.md ]; then
            words=$(cat docs/PITCH.md | grep -v '^#' | grep -v '^<!--' | grep -v '^$' | wc -w)
            echo "PITCH.md: $words words"
            if [ "$words" -gt 200 ]; then
              echo "::error::PITCH.md exceeds 200-word limit ($words words)"
              exit 1
            fi
          fi
